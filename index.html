<!DOCTYPE html>
<!-- saved from url=(0073)file:///Users/paul/Downloads/%E6%94%B6%E6%94%AF%E8%AE%B0%E5%BD%95App.html -->
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="收支记录">
<title>收支记录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f2f2f7;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:80px}
.hdr{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-title{font-size:18px;font-weight:700;color:#1c1c1e}
.hdr-month{font-size:13px;color:#8e8e93}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px 8px}
.stat{background:#fff;border-radius:12px;padding:10px 6px;text-align:center}
.stat-label{font-size:11px;color:#8e8e93;margin-bottom:3px}
.stat-val{font-size:16px;font-weight:700}
.iv{color:#34c759}.ev{color:#ff3b30}.np{color:#34c759}.nn{color:#ff3b30}
.section{padding:8px 16px}
.card{background:#fff;border-radius:16px;padding:16px}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.tbtn{flex:1;padding:11px 6px;border:2px solid #e5e5ea;border-radius:12px;background:#fff;color:#8e8e93;font-size:15px;cursor:pointer;text-align:center;font-weight:500}
.tin{background:#f0fff4;border-color:#34c759;color:#1a7a35}
.tout{background:#fff5f5;border-color:#ff3b30;color:#c0392b}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-full{margin-bottom:10px}
label{font-size:12px;color:#8e8e93;display:block;margin-bottom:5px;font-weight:500}
input,select{width:100%;padding:11px 12px;font-size:15px;border:1px solid #e5e5ea;border-radius:10px;background:#fff;color:#1c1c1e;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:#007aff;border-width:2px}
.btn-add{width:100%;padding:14px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:2px}
.btn-add:active{background:#0051d5;transform:scale(0.98)}
.list-wrap{padding:0 16px}
.day-group{margin-bottom:10px}
.day-hdr{font-size:12px;color:#8e8e93;padding:8px 4px 5px;display:flex;justify-content:space-between;font-weight:600;letter-spacing:.3px}
.rec{display:flex;align-items:center;padding:11px 12px;background:#fff;border-radius:12px;margin-bottom:5px}
.rec-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px;flex-shrink:0}
.rec-info{flex:1;min-width:0}
.rec-desc{font-size:15px;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.rec-cat{font-size:12px;color:#8e8e93;margin-top:2px}
.rec-amt{font-size:15px;font-weight:700;margin-right:8px;white-space:nowrap}
.rec-del{background:none;border:none;color:#c7c7cc;cursor:pointer;padding:6px;font-size:20px;line-height:1}
.empty{text-align:center;padding:60px 16px;color:#8e8e93;font-size:15px}
.empty-icon{font-size:52px;display:block;margin-bottom:12px}
.nav{display:flex;border-top:1px solid #e5e5ea;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,0px);backdrop-filter:blur(10px)}
.nbtn{flex:1;padding:8px 0 5px;text-align:center;cursor:pointer;font-size:10px;color:#8e8e93;font-weight:500}
.nbtn.on{color:#007aff}
.nbtn-icon{font-size:22px;display:block;line-height:1.3}
.stats-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px}
.stitle{font-size:12px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.cat-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;align-items:center}
.bar-bg{height:6px;background:#f2f2f7;border-radius:3px;margin-bottom:12px}
.bar{height:6px;border-radius:3px;transition:width .3s}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">💰 收支记录</span>
  <span class="hdr-month" id="hdr-month">2026年5月</span>
</div>

<div class="summary">
  <div class="stat"><div class="stat-label">收入</div><div class="stat-val iv" id="s-in">0.00</div></div>
  <div class="stat"><div class="stat-label">支出</div><div class="stat-val ev" id="s-out">0.00</div></div>
  <div class="stat"><div class="stat-label">结余</div><div class="stat-val np" id="s-net">0.00</div></div>
</div>

<div id="pg-add" style="display:none">
  <div class="section">
    <div class="card">
      <div class="type-toggle">
        <div class="tbtn tin" id="btn-in" onclick="setType(&#39;income&#39;)">📈 收入</div>
        <div class="tbtn" id="btn-out" onclick="setType(&#39;expense&#39;)">💸 支出</div>
      </div>
      <div class="form-row">
        <div><label>日期</label><input type="date" id="inp-date"></div>
        <div><label>金额（元）</label><input type="number" id="inp-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <div class="form-full"><label>说明</label><input type="text" id="inp-desc" placeholder="例：卖掉天娱数科"></div>
      <div class="form-full"><label>分类</label>
        <select id="inp-cat">
          <option value="股票">📈 股票</option>
          <option value="工资">💼 工资</option>
          <option value="餐饮">🍜 餐饮</option>
          <option value="交通">🚗 交通</option>
          <option value="购物">🛍️ 购物</option>
          <option value="娱乐">🎮 娱乐</option>
          <option value="医疗">🏥 医疗</option>
          <option value="转账">🔄 转账</option>
          <option value="其他">📌 其他</option>
        </select>
      </div>
      <button class="btn-add" onclick="addRec()">＋ 添加记录</button>
    </div>
  </div>
</div>

<div id="pg-list" style="display: block;">
  <div class="list-wrap" id="list-body"><div class="empty"><span class="empty-icon">📒</span>还没有记录<br><br>点下方"记账"添加</div></div>
</div>

<div id="pg-stats" style="display:none">
  <div class="section" id="stats-body"></div>
</div>

<div class="nav">
  <div class="nbtn on" id="nav-list" onclick="go(&#39;list&#39;)"><span class="nbtn-icon">📋</span>明细</div>
  <div class="nbtn" id="nav-add" onclick="go(&#39;add&#39;)"><span class="nbtn-icon">➕</span>记账</div>
  <div class="nbtn" id="nav-stats" onclick="go(&#39;stats&#39;)"><span class="nbtn-icon">📊</span>统计</div>
</div>

<script>
var recs=[], curType='income';
try{recs=JSON.parse(localStorage.getItem('cf2')||'[]');}catch(e){}

function td(){var d=new Date(),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
document.getElementById('inp-date').value=td();
document.getElementById('hdr-month').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long'});

function save(){try{localStorage.setItem('cf2',JSON.stringify(recs));}catch(e){}}
function fmt(n){return parseFloat(n).toFixed(2);}

function setType(t){
  curType=t;
  document.getElementById('btn-in').className='tbtn'+(t==='income'?' tin':'');
  document.getElementById('btn-out').className='tbtn'+(t==='expense'?' tout':'');
}

function addRec(){
  var dt=document.getElementById('inp-date').value;
  var amt=parseFloat(document.getElementById('inp-amt').value);
  var desc=document.getElementById('inp-desc').value.trim()||'未填说明';
  var cat=document.getElementById('inp-cat').value;
  if(!dt||isNaN(amt)||amt<=0){alert('请填写日期和金额');return;}
  recs.push({id:Date.now(),date:dt,type:curType,amount:amt,desc:desc,cat:cat});
  recs.sort(function(a,b){return b.date.localeCompare(a.date);});
  save();render();go('list');
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-desc').value='';
}

function delRec(id){
  if(!confirm('确定删除？'))return;
  recs=recs.filter(function(r){return r.id!==id;});
  save();render();
}

function go(t){
  document.getElementById('pg-add').style.display=t==='add'?'block':'none';
  document.getElementById('pg-list').style.display=t==='list'?'block':'none';
  document.getElementById('pg-stats').style.display=t==='stats'?'block':'none';
  ['list','add','stats'].forEach(function(x){document.getElementById('nav-'+x).className='nbtn'+(t===x?' on':'');});
  if(t==='stats')renderStats();
}

function render(){
  var tIn=recs.filter(function(r){return r.type==='income';}).reduce(function(s,r){return s+r.amount;},0);
  var tOut=recs.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
  var net=tIn-tOut;
  document.getElementById('s-in').textContent=fmt(tIn);
  document.getElementById('s-out').textContent=fmt(tOut);
  var el=document.getElementById('s-net');
  el.textContent=fmt(net);
  el.className='stat-val '+(net>=0?'np':'nn');
  var body=document.getElementById('list-body');
  if(!recs.length){body.innerHTML='<div class="empty"><span class="empty-icon">📒</span>还没有记录<br><br>点下方"记账"添加</div>';return;}
  var groups={};
  recs.forEach(function(r){if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  var dates=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
  body.innerHTML=dates.map(function(d){
    var rs=groups[d];
    var dIn=rs.filter(function(r){return r.type==='income';}).reduce(function(s,r){return s+r.amount;},0);
    var dOut=rs.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
    var ds=new Date(d+'T12:00:00').toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
    var sum=(dIn>0?'<span style="color:#34c759">+'+fmt(dIn)+'</span>':'')+( dIn>0&&dOut>0?' / ':'')+( dOut>0?'<span style="color:#ff3b30">-'+fmt(dOut)+'</span>':'');
    return '<div class="day-group"><div class="day-hdr"><span>'+ds+'</span><span>'+sum+'</span></div>'+
      rs.map(function(r){
        return '<div class="rec"><div class="rec-icon" style="background:'+(r.type==='income'?'#eafaf1':'#fff0f0')+'">'+(r.type==='income'?'📈':'💸')+'</div>'+
        '<div class="rec-info"><div class="rec-desc">'+r.desc+'</div><div class="rec-cat">'+r.cat+'</div></div>'+
        '<div class="rec-amt" style="color:'+(r.type==='income'?'#34c759':'#ff3b30')+'">'+(r.type==='income'?'+':'-')+fmt(r.amount)+'</div>'+
        '<button class="rec-del" onclick="delRec('+r.id+')">🗑</button></div>';
      }).join('')+'</div>';
  }).join('');
}

function renderStats(){
  var body=document.getElementById('stats-body');
  if(!recs.length){body.innerHTML='<div class="empty">暂无数据</div>';return;}
  var tIn=recs.filter(function(r){return r.type==='income';}).reduce(function(s,r){return s+r.amount;},0);
  var tOut=recs.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
  var net=tIn-tOut;
  var catIn={},catOut={};
  recs.forEach(function(r){if(r.type==='income')catIn[r.cat]=(catIn[r.cat]||0)+r.amount;else catOut[r.cat]=(catOut[r.cat]||0)+r.amount;});
  var iItems=Object.entries(catIn).sort(function(a,b){return b[1]-a[1];});
  var oItems=Object.entries(catOut).sort(function(a,b){return b[1]-a[1];});
  var maxI=iItems[0]?iItems[0][1]:1, maxO=oItems[0]?oItems[0][1]:1;
  body.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'+
    '<div class="stat"><div class="stat-label">收入</div><div class="stat-val iv">'+fmt(tIn)+'</div></div>'+
    '<div class="stat"><div class="stat-label">支出</div><div class="stat-val ev">'+fmt(tOut)+'</div></div>'+
    '<div class="stat"><div class="stat-label">结余</div><div class="stat-val '+(net>=0?'np':'nn')+'">'+fmt(net)+'</div></div></div>'+
    (iItems.length?'<div class="stats-card"><div class="stitle">📈 收入分类</div>'+
      iItems.map(function(e){return '<div class="cat-row"><span>'+e[0]+'</span><span style="color:#34c759;font-weight:700">+'+fmt(e[1])+'</span></div>'+
        '<div class="bar-bg"><div class="bar" style="width:'+Math.round(e[1]/maxI*100)+'%;background:#34c759"></div></div>';}).join('')+'</div>':'')+
    (oItems.length?'<div class="stats-card"><div class="stitle">💸 支出分类</div>'+
      oItems.map(function(e){return '<div class="cat-row"><span>'+e[0]+'</span><span style="color:#ff3b30;font-weight:700">-'+fmt(e[1])+'</span></div>'+
        '<div class="bar-bg"><div class="bar" style="width:'+Math.round(e[1]/maxO*100)+'%;background:#ff3b30"></div></div>';}).join('')+'</div>':'');
}

render();go('list');
</script>


</body></html>
